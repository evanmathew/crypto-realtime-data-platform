version: 2

models:
  - name: stg_crypto_prices
    description: "Cleaned and flattened crypto prices from CoinGecko raw layer"
    columns:
      - name: coin_id
        description: "Unique coin identifier"
        tests:
          - not_null
      - name: current_price_usd
        description: "Current price in USD"
        tests:
          - not_null
      - name: symbol
        description: "Coin ticker symbol"
        tests:
          - not_null
          - accepted_values:
              values: ['btc', 'eth', 'sol', 'bnb', 'xrp']
      - name: ingested_at
        description: "Ingestion timestamp"
        tests:
          - not_null

  - name: int_crypto_hourly
    description: "Hourly aggregated crypto prices"
    columns:
      - name: coin_id
        tests:
          - not_null
      - name: hour_bucket
        tests:
          - not_null
      - name: avg_price_usd
        tests:
          - not_null

  - name: mart_coin_performance_summary
    description: "Latest coin performance metrics — BI ready"
    columns:
      - name: coin_id
        tests:
          - not_null
          - unique
      - name: current_price_usd
        tests:
          - not_null
      - name: market_dominance_pct
        tests:
          - not_null